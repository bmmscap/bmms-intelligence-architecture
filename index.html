<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Comprehensive description of the page for SEO purposes">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta property="og:title" content="Title for Social Media">
    <meta property="og:description" content="Description for Social Media">
    <meta property="og:image" content="image-url.jpg">
    <link rel="stylesheet" href="styles.css" media="print" onload="this.onload=null;this.removeAttribute('media');">
    <script defer src="script.js"></script>
    <title>Your Website Title</title>
    <style>
        /* Inline Critical CSS for above-the-fold content */
        body { margin: 0; font-family: Arial, sans-serif; }
        header { background-color: #f8f9fa; padding: 10px; }
    </style>
</head>
<body>
    <header role="banner">
        <h1>Main Title of the Document</h1>
    </header>
    <main role="main">
        <form id="contactForm">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required pattern="[A-Za-z\s]+" placeholder="Enter your name">
            <span class="error-message" aria-live="polite"></span>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email">
            <span class="error-message" aria-live="polite"></span>
            <input type="submit" value="Submit">
        </form>
        <img src="lazy-load-image.jpg" loading="lazy" alt="Description of image">
    </main>
    <script>
        document.getElementById('contactForm').onsubmit = function(event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            alert('Thank you for your submission, ' + name + '!');
            localStorage.setItem('name', name);
            localStorage.setItem('email', email);
        };
    </script>
</body>
</html>
